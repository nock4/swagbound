<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoilSnake First Scene</title>
    <link rel="icon" href="data:," />
    <!-- Self-hosted menu/dialogue typeface (Pixelify Sans variable font, weights 400-700).
         Bundled at /fonts/pixelify-sans.woff2 so the UI font works fully offline; the
         cleanUi.ts fallback stack still covers the rare case the file fails to load. -->
    <link
      rel="preload"
      href="/fonts/pixelify-sans.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "Pixelify Sans";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url("/fonts/pixelify-sans.woff2") format("woff2");
      }
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000000;
      }

      body {
        overflow: hidden;
      }

      #app {
        position: relative;
      }

      #game-loading {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        background: #000000;
        color: #ffffff;
        font-family: "Pixelify Sans", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: clamp(18px, 4vw, 28px);
        font-weight: 600;
        letter-spacing: 0.16em;
        text-align: center;
        animation: loading-pulse 1.15s ease-in-out infinite;
      }

      @keyframes loading-pulse {
        0%,
        100% {
          opacity: 0.38;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-loading" aria-live="polite">LOADING...</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
