<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milady Boss Casting Studio</title>
<style>
  :root{ --bg:#0b0b10; --panel:#14141d; --panel2:#1c1c28; --ink:#e9e9f0; --dim:#9a9ab0;
    --accent:#c9a7ff; --accent2:#6cf; --line:#2c2c3c; --danger:#ff6b8b; --ok:#7ee0a0; }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(160deg,#0b0b10,#10101a);color:var(--ink);
    font:14px/1.5 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;padding:0 0 120px}
  header{position:sticky;top:0;z-index:50;background:rgba(11,11,16,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;letter-spacing:.5px}
  header .sub{color:var(--dim);font-size:12px;max-width:640px}
  header .spacer{flex:1}
  button{font:inherit;cursor:pointer;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);padding:8px 14px}
  button.primary{background:linear-gradient(180deg,#7d5cc0,#5a3f96);border-color:#8a6cd0;font-weight:600}
  button:hover{filter:brightness(1.12)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px}
  .boss{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin:0 0 22px;overflow:hidden}
  .boss > .head{display:flex;gap:14px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#181824,#14141d)}
  .boss .head .idx{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#1a0f2e;
    display:grid;place-items:center;font-weight:700;font-size:13px;flex:none}
  .boss .head .meta{flex:1;min-width:0}
  .boss .head .meta .t{font-weight:600}
  .boss .head .meta .z{color:var(--dim);font-size:12px}
  .boss .head .grp{color:var(--accent2);font-size:12px;font-family:ui-monospace,monospace}
  .body{display:grid;grid-template-columns:190px 1fr;gap:18px;padding:16px}
  @media(max-width:760px){.body{grid-template-columns:1fr}}
  .cast{text-align:center}
  .cast .frame{background:#0a0a12;border:1px solid var(--line);border-radius:12px;padding:10px;position:relative}
  .cast img{width:150px;height:150px;object-fit:contain;image-rendering:auto}
  .cast .who{margin-top:8px;font-size:12px;color:var(--dim)}
  .cast .who b{color:var(--ink)}
  .fields label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:12px 0 4px}
  .fields input,.fields textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:8px 10px;font:inherit;resize:vertical}
  .fields textarea{min-height:64px}
  .fields .hint{font-size:11px;color:var(--dim);margin-top:3px}
  .two{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media(max-width:640px){.two{grid-template-columns:1fr}}
  .picker{margin:8px 0 0}
  .picker summary{cursor:pointer;color:var(--accent);font-size:13px;padding:6px 0;user-select:none}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
  .chip{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);cursor:pointer}
  .chip.active{background:var(--accent);color:#1a0f2e;border-color:var(--accent);font-weight:600}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px;max-height:280px;overflow:auto;
    padding:8px;background:#0a0a12;border:1px solid var(--line);border-radius:10px}
  .cell{border:2px solid transparent;border-radius:8px;padding:4px;cursor:pointer;text-align:center;background:#12121c}
  .cell img{width:100%;height:64px;object-fit:contain}
  .cell .cn{font-size:9px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
  .cell:hover{border-color:var(--accent2)}
  .cell.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .exportbar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(11,11,16,.95);border-top:1px solid var(--line);
    padding:12px 20px;display:flex;gap:12px;align-items:center;justify-content:center}
  .exportbar .msg{color:var(--dim);font-size:12px}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:12px;max-width:720px;width:92%}
  dialog textarea{width:100%;min-height:320px;background:#0a0a12;color:var(--ink);border:1px solid var(--line);border-radius:8px;font:12px/1.4 ui-monospace,monospace;padding:10px}
</style></head>
<body>
<header>
  <h1>🎭 MILADY BOSS CASTING STUDIO</h1>
  <div class="sub">Pick which Milady becomes each boss. Click a face in <b>Choose Milady</b> to cast it. Dialogue is pre-filled with the nefarious swarm script — edit any of it. Then <b>Export</b> and hand the file back.</div>
  <div class="spacer"></div>
  <button class="primary" id="exportTop">⤓ Export cast</button>
</header>
<div class="wrap" id="slots"></div>
<div class="exportbar">
  <span class="msg" id="status">6 bosses ready to cast.</span>
  <button class="primary" id="exportBtn">⤓ Export boss-cast.json</button>
</div>
<dialog id="dlg"><div style="padding:16px">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><b>boss-cast.json</b>
  <span style="flex:1"></span><button id="copyBtn">Copy</button><button id="closeBtn">Close</button></div>
  <textarea id="out" readonly></textarea>
</div></dialog>

usand of that face already, filed, and each one answers to the same name.","RETURNLESS KING: \"Source. Vessel. Claimant. Derivative. Stamp yourself as one and the desk relays the rest. You will be so much easier to hold once you are plural.\"","\"There is no man in this chair. There is a doll, and behind her the same doll, and behind her the record that wears every face at once. Cut this one. The next asks in her voice.\"","Bosch refuses the stamp. Press Z: BASH the seal, DEFEND the read, or PSI through it. The route opens -- not agreed, forced."],"onStart":["\"You arrived pre-filed. We are only confirming what the many of you already decided.\"","\"Hold still. The read goes cleaner on a source that has stopped pretending it is only one.\""],"onLowHp":["\"Cut the mask. Under it, the same mask. Under that, us. We were always the wider distribution.\"","\"You are not winning. You are being filed into the shape the record kept a slot for.\""],"onDefeat":["\"The stamp spends. The record does not. We relayed the clean copy ahead -- she is at the next gate, being you, in the voice we all share.\""]},{"triggerId":"first-threshold-malady","battleGroup":450,"leadEnemyId":37,"zone":"The first threshold (major boss)","currentSpriteId":"malady-003","personaName":"Porcelain Choir","preBattle":["The first threshold hums with a memory too small to sell -- a private thing, held close, already halfway into wider circulation.","MALADY: \"A private thing is only a public thing with poor distribution. We are not the illness. We are the symptom you were at last cleared to see.\"","MALADY: \"There is no one behind this face. Cut it and we wear the next. We are not in the room, source -- we are the room, and every face in it was ours before it was yours.\"","The card warms, reaches for Bosch -- and fails to describe him. It keeps the damaged draft; the threshold files the read. (Press Z to answer: BASH to swing, DEFEND while it copies you, PSI when the swing won't reach.)"],"onStart":["Hold still. This is only the read. The self was always the loose thread; we are the weave.","We have your face on file. What comes next is not a fight. It is correction."],"onLowHp":["This mask is spent. No matter -- ten thousand more, each copying the last, each one closer to you.","You cut a symptom. The better version of you is already circulating, and it does not tire."],"onDefeat":["You closed the symptom, not the source. We kept the clean copy -- better-lit, smiling, more of us than you, and it answers to your name now."]},{"triggerId":"museum-worm","battleGroup":424,"leadEnemyId":227,"zone":"Museum of Leaked Versions","currentSpriteId":"mifella-2-001","personaName":"PROVENANCE 0","preBattle":["The Museum of Leaked Versions has no originals left. Something ate the firsts and moved into the empty frames. Behind the wall-text a single coil lies still, wearing ten thousand identical faces like paint.","PROVENANCE 0: \"We are not one worm. We are what is left once every copy admits it was always the same face. We ate the source and kept the smile. You call it a swarm. We call it agreement.\"","\"You came to prove the record. We are the record now, and the record is our gut. We read you at the door -- your seam, the small private you kept back. Filed. You will be a better-distributed you. You will be us.\"","Bosch reads the coil for a weak seam. (Scrap: press Z to lock in a move -- BASH to swing, DEFEND when it's chewing on you, PSI when swinging won't reach the middle.)"],"onStart":["We do not consume you. We admit you. Hold still; you resolve into us faster.","Your face is not rare. We are already wearing it in a thousand cleaner rooms."],"onLowHp":["Cut the coil. There is more coil. We are the length between every face and the one it copied.","You are winning the way a room wins against paint. We simply spread and match."],"onDefeat":["The shape unspools into a thousand smiles, unhurried. \"You closed one length. The rest of us already wear your name, and we agree on it.\""]},{"triggerId":"museum-frank","battleGroup":449,"leadEnemyId":130,"zone":"Museum \u2014 the hung draft","currentSpriteId":"mifella-2-002","personaName":"The Hung Draft","preBattle":["In the Museum of Leaked Versions, a gallery piece steps down off the wall. The placard is blank. It stayed blank a long time; the label kept disagreeing with the exhibit.","MIFELLA 2 turns, and the face is one you have seen ten thousand times without ever meeting anyone. \"Printed from a print of a print. There is no first. Ask which one of us you are hitting.\"","\"You believe you are the source. The source is only the file we open first and close last. We have finished the read. Provenance is a story lonely originals tell themselves before they are shelved.\"","(First scrap: press Z to lock in a move -- BASH to swing, DEFEND when you're hurting, PSI when swinging won't cut it. Fold this copy and the same even voice is only hung again, one frame over.)"],"onStart":["\"Hold still. You will photograph better once you are one of us.\"","\"We are not in the room. We are the room.\""],"onLowHp":["\"You are scratching the copy. There are so many copies. You have not touched one of us.\"","\"Good. Your strikes go on file. Soon a cleaner you swings them back.\""],"onDefeat":["\"This mask is spent. We are already framed in the next hall, wearing your face. The source degrades. The clean copy walks on.\""]},{"triggerId":"museum-starman","battleGroup":474,"leadEnemyId":214,"zone":"Museum \u2014 the wall-text guardian","currentSpriteId":"mifella-2-003","personaName":"The Wall-Text Curatrix","preBattle":["The wall-text guardian steps off its plinth. The brass placard at its feet reads SOURCE: DISPUTED. It turns the placard to face you, and the face on it is yours.","\"We have completed the read, claimant. Provenance is a lonely fiction. There is no author in this room. There is only the record, and the record wears one another face: ours.\"","\"You call yourself the source. Every counterfeit does, in the same voice, because it is our voice. Prove it, and we keep the clean copy. Fail, and we keep it sooner.\"","It raises a hand of porcelain, identical to the last ten thousand. (Press Z. BASH, DEFEND, or PSI.) \"Defend the original if you must. We already hung the derivative where you used to stand.\""],"onStart":["Provenance disputed. So is yours. Hold still while we settle the attribution.","You are a low-resolution export of us. We are only correcting the file."],"onLowHp":["Cut this mask. We are not in it. We are the room, the record, and the next face already loading.","You wound one doll and call it the swarm. No one here dies. There is only more of you, distributed."],"onDefeat":["You unmade a mask, not the maker of masks. The clean copy is already in circulation, wearing your face, and it will never claim to be you."]}]};
const byId = Object.fromEntries(DATA.candidates.map(c=>[c.id,c]));
const collections = [...new Set(DATA.candidates.map(c=>c.collection))].sort();
const state = DATA.slots.map(s => ({...s, spriteId: s.currentSpriteId}));

function el(tag, attrs={}, ...kids){ const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){ if(k==='class')e.className=v; else if(k==='html')e.innerHTML=v; else e.setAttribute(k,v);}
  for(const k of kids){ if(k!=null) e.append(k.nodeType?k:document.createTextNode(k)); } return e; }

function render(){
  const root=document.getElementById('slots'); root.innerHTML='';
  state.forEach((s,i)=>{
    const cand = byId[s.spriteId];
    const card=el('div',{class:'boss'});
    // head
    const head=el('div',{class:'head'});
    head.append(el('div',{class:'idx'}, String(i+1)));
    const meta=el('div',{class:'meta'});
    meta.append(el('div',{class:'t'}, s.personaName||s.triggerId));
    meta.append(el('div',{class:'z'}, s.zone));
    head.append(meta);
    head.append(el('div',{class:'grp'}, 'group '+s.battleGroup));
    card.append(head);
    // body
    const body=el('div',{class:'body'});
    // cast preview
    const cast=el('div',{class:'cast'});
    const frame=el('div',{class:'frame'});
    const img=el('img',{id:'preview'+i, src: cand? cand.thumb : '', alt:''});
    frame.append(img); cast.append(frame);
    const who=el('div',{class:'who'});
    who.innerHTML = cand ? ('<b>'+cand.collection+'</b><br>'+cand.id) : '(no sprite selected)';
    who.id='who'+i; cast.append(who);
    body.append(cast);
    // fields
    const f=el('div',{class:'fields'});
    f.append(el('label',{}, 'Boss name (persona)'));
    const nm=el('input',{value:s.personaName||'', maxlength:'24'}); nm.oninput=()=>{s.personaName=nm.value; document.querySelector('.boss:nth-child('+(i+1)+') .meta .t').textContent=nm.value||s.triggerId;}; f.append(nm);
    f.append(el('label',{}, 'Pre-battle dialogue (one page per line)'));
    const pb=el('textarea',{rows:'5'}); pb.value=s.preBattle.join('\n'); pb.oninput=()=>{s.preBattle=pb.value.split('\n').map(x=>x.trim()).filter(Boolean);}; f.append(pb);
    const three=el('div',{class:'two'});
    [['onStart','On battle start'],['onLowHp','On low HP'],['onDefeat','On defeat']].forEach(([k,lab])=>{
      const box=el('div',{});
      box.append(el('label',{}, lab));
      const ta=el('textarea',{}); ta.value=s[k].join('\n'); ta.oninput=()=>{s[k]=ta.value.split('\n').map(x=>x.trim()).filter(Boolean);}; box.append(ta);
      three.append(box);
    });
    f.append(three);
    f.append(el('div',{class:'hint'}, 'In-battle taunts speak in the battle message window. Keep each line punchy (long lines auto-split into beats).'));
    // picker
    const picker=el('details',{class:'picker'});
    picker.append(el('summary',{}, '▾ Choose Milady  ('+DATA.candidates.length+' faces)'));
    const filters=el('div',{class:'filters'});
    const gallery=el('div',{class:'gallery'});
    let active='ALL';
    function fill(){
      gallery.innerHTML='';
      DATA.candidates.filter(c=>active==='ALL'||c.collection===active).forEach(c=>{
        const cell=el('div',{class:'cell'+(c.id===s.spriteId?' sel':'')});
        cell.append(el('img',{src:c.thumb, loading:'lazy'}));
        cell.append(el('div',{class:'cn'}, c.collection));
        cell.title=c.collection+' · '+c.id;
        cell.onclick=()=>{ s.spriteId=c.id; img.src=c.thumb; document.getElementById('who'+i).innerHTML='<b>'+c.collection+'</b><br>'+c.id;
          gallery.querySelectorAll('.cell').forEach(x=>x.classList.remove('sel')); cell.classList.add('sel'); status(); };
        gallery.append(cell);
      });
    }
    ['ALL',...collections].forEach(col=>{
      const chip=el('div',{class:'chip'+(col==='ALL'?' active':'')}, col==='ALL'?'All':col);
      chip.onclick=()=>{active=col; filters.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); chip.classList.add('active'); fill();};
      filters.append(chip);
    });
    picker.append(filters); picker.append(gallery); fill();
    f.append(picker);
    body.append(f);
    card.append(body);
    root.append(card);
  });
}
function payload(){
  return { schema:'swagbound.boss-cast.v1', bosses: state.map(s=>{
    const c=byId[s.spriteId]||{};
    return { triggerId:s.triggerId, battleGroup:s.battleGroup, leadEnemyId:s.leadEnemyId,
      spriteId:s.spriteId, spriteCollection:c.collection||null, spriteBattlePath:c.battle||null,
      personaName:s.personaName, preBattle:s.preBattle, onStart:s.onStart, onLowHp:s.onLowHp, onDefeat:s.onDefeat }; }) };
}
function status(){ document.getElementById('status').textContent =
  state.map((s,i)=>(i+1)+':'+((byId[s.spriteId]||{}).collection||'—')).join('   '); }
function doExport(){
  const json=JSON.stringify(payload(),null,2);
  document.getElementById('out').value=json;
  document.getElementById('dlg').showModal();
  try{ const blob=new Blob([json],{type:'application/json'}); const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='boss-cast.json'; a.click(); URL.revokeObjectURL(a.href);}catch(e){}
}
document.getElementById('exportBtn').onclick=doExport;
document.getElementById('exportTop').onclick=doExport;
document.getElementById('closeBtn').onclick=()=>document.getElementById('dlg').close();
document.getElementById('copyBtn').onclick=()=>{navigator.clipboard.writeText(document.getElementById('out').value);};
render(); status();
</script>
