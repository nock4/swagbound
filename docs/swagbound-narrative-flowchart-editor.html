sch deeper through a credential.", "action": "Use or reject working keycard / VIP route.", "conclusion": "Bosch learns every route has an insertion point.", "sources": "[[act-2-dry-vice-belt-area-pitch]]", "notes": ""}, {"id": "F4", "conflict": "The downstream system does not need truth, only placement.", "action": "Clear threshold boss / route handoff.", "conclusion": "Act 3 setup: institutional culture can preserve and reissue leaked versions.", "sources": "act3 museum PRD", "notes": ""}]}, {"id": "G", "area": "Act 3 Museum of Dox Sheets", "storyJob": "Derivative ecosystem after Malady", "corePressure": "Private source becomes public exhibit", "mainObject": "Source Pocket, residues, wall labels, wristbands", "nodes": [{"id": "G1", "conflict": "Bosch enters a museum that mistakes him for an exhibit.", "action": "Arrive in lobby, receive accession number.", "conclusion": "The enemy has become prestigious institution, not street rumor.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G2", "conflict": "Museum countdown announces `Bosch: A Dox Sheet`.", "action": "Inspect lobby exhibit / wall label.", "conclusion": "Clear act problem: the museum will canonize the copy and flush living Bosch.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G3", "conflict": "The Source Pocket has been broken into certified fragments.", "action": "Learn residue rules from Night Docent / first gallery.", "conclusion": "Quest becomes heist/investigation, not boss hallway.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G4", "conflict": "Provenance Heiress guards a fragment behind ownership proof.", "action": "Defeat / out-argue / refuse ownership frame.", "conclusion": "First residue gained: Wax Seal. Museum label says Proof; true role is Claim.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G5", "conflict": "Take Engine makes reaction strengthen the exhibit.", "action": "Starve reaction, wait, inspect, or fight with restraint.", "conclusion": "Player learns refusal can be action. Residue: Applause Sign, true role Reaction.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G6", "conflict": "Variant Saint presents plausible Bosches.", "action": "Use Select to choose living flaw, not clean variant.", "conclusion": "Bosch learns the act's core verb: Select. Residue: Cracked Mirror, true role Choice.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G7", "conflict": "Museum offers VIP verification as false solution.", "action": "Refuse Blue-Check Reliquary's official proof path.", "conclusion": "Being verified by the enemy would open the route by caging Bosch.", "sources": "act3 museum PRD", "notes": ""}, {"id": "G8", "conflict": "Basement rave asks for role, not key.", "action": "Choose wristband / door-list role or become unframed.", "conclusion": "Wearing a role grants access but changes how the room reads Bosch.", "sources": "[[act-3-milady-rave-dialogue-reference]]", "notes": ""}]}, {"id": "H", "area": "Basement / Schizocollage Hell", "storyJob": "Rejected originals and over-witnessed images", "corePressure": "Failed proofs become monsters", "mainObject": "Image sump, Unframed Source", "nodes": [{"id": "H1", "conflict": "Waiting Room offers wrong accreditation arrangement.", "action": "Arrange residues by true role instead of museum label.", "conclusion": "`Unframed Source` begins reconstructing.", "sources": "act3 museum PRD", "notes": ""}, {"id": "H2", "conflict": "Player must choose `Frame me` or `Leave unframed`.", "action": "Choose `Leave unframed`.", "conclusion": "Basement route opens without museum approval. `act3.unframedSourceRebuilt = true`.", "sources": "act3 museum PRD", "notes": ""}, {"id": "H3", "conflict": "Basement image sump contains rejected proofs and failed originals.", "action": "Descend, fight Bad Image Cherub / Wall Text Maw.", "conclusion": "Bosch sees what happens when living source loses private signal.", "sources": "act3 museum PRD", "notes": ""}, {"id": "H4", "conflict": "Wall labels keep trying to make damage official.", "action": "De-layer false labels, name frame as frame.", "conclusion": "`Unframed Source` becomes usable against Dox Sheet Bosch.", "sources": "act3 museum PRD", "notes": ""}]}, {"id": "I", "area": "Dox Sheet Bosch / Endgame handoff", "storyJob": "Enemy method applied to Bosch", "corePressure": "More official copy tries to replace living Bosch", "mainObject": "Final frame, living selection, refusal", "nodes": [{"id": "I1", "conflict": "Dox Sheet Bosch is better documented, preferred, and almost canonical.", "action": "Enter final opening / exhibit room.", "conclusion": "Final boss embodies the museum's method applied to Bosch.", "sources": "act3 museum PRD", "notes": ""}, {"id": "I2", "conflict": "The copy uses records, reactions, variants, and prestige layers to out-official Bosch.", "action": "Use Select, starve reaction, refuse verification, deploy Unframed Source.", "conclusion": "Bosch stops trying to prove he is real inside the museum's terms.", "sources": "act3 museum PRD", "notes": ""}, {"id": "I3", "conflict": "Museum asks for final frame.", "action": "Leave unframed.", "conclusion": "Bosch exits as living person, not verified object. Museum remains but one exhibit is missing.", "sources": "act3 museum PRD", "notes": ""}, {"id": "I4", "conflict": "Act 3 handoff reveals the derivative ecosystem is only one layer of the enemy force.", "action": "Exit museum with surviving witness trail / freed Source Pocket.", "conclusion": "Endgame opens: break the image-machine that made the museum possible.", "sources": "[[milady-remilia-cosmic-antagonist-reframe]]", "notes": ""}]}, {"id": "J", "area": "Final Milady/Remilia defeat", "storyJob": "Open endgame slot", "corePressure": "Break the image-machine, not only one boss", "mainObject": "TBD after Act 3 locks", "nodes": [{"id": "J1", "conflict": "Milady/Remilia image-machine still names the world from above and below.", "action": "TBD: locate the administrative nervous system behind Supp let scale=.32, tx=120, ty=80, dragging=false, sx=0, sy=0, stx=0, sty=0, current=null;
const colors=['#c9c9c9','#a9d18e','#8ed7e8','#c6b5e8','#ef9a9a','#ffe699','#f4b183','#b7e1cd','#d9d2e9','#b6a38a'];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function short(s,n=118){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s}
function verb(s){const m=String(s||'').match(/\b(Start|Accept|Inspect|Talk|Walk|Check|Buy|Hear|Survive|Enter|Defeat|Insert|Answer|Reach|Face|Choose|Use|Follow|Fill|Cross|Play|Clear|Arrive|Learn|Refuse|Descend|Select|Exit|TBD)\b/i);return m?m[1]:'act'}
function layout(){let items=[];const startX=190,startY=170,rowH=190,gapX=215;data.rows.forEach((r,ri)=>{const y=startY+ri*rowH;const w=Math.max(900,(r.nodes.length||1)*gapX+100);r._box={x:110,y:y-58,w,h:rowH-22};r.nodes.forEach((n,ni)=>{n._pos={x:startX+ni*gapX,y:y,w:172,h:78};items.push(n)})});return items}
function render(){layout();renderRegions();renderNodes();renderArrows();applyTransform();document.getElementById('mini').textContent=`${data.rows.length} regions / ${data.rows.reduce((a,r)=>a+r.nodes.length,0)} nodes / zoom ${Math.round(scale*100)}%`}
function renderRegions(){const el=document.getElementById('regions');el.innerHTML='';data.rows.forEach((r,ri)=>{const d=document.createElement('div');d.className='region';Object.assign(d.style,{left:r._box.x+'px',top:r._box.y+'px',width:r._box.w+'px',height:r._box.h+'px',background:colors[ri%colors.length]});d.innerHTML=`<div class="regionTitle">${esc(r.id)}. ${esc(r.area)}</div><div class="regionMeta">${esc(r.storyJob)}<br>${esc(r.mainObject)}</div>`;el.appendChild(d)})}
function renderNodes(){const el=document.getElementById('nodes');el.innerHTML='';data.rows.forEach((r,ri)=>r.nodes.forEach((n,ni)=>{const p=n._pos;const d=document.createElement('div');d.className='node'+(current&&current.node===n?' selected':'');d.style.left=p.x+'px';d.style.top=p.y+'px';d.style.width=p.w+'px';d.style.minHeight=p.h+'px';d.innerHTML=`<div class="nodeHead" style="background:${colors[ri%colors.length]}">${esc(n.id)} <span class="tag">${esc(verb(n.action))}</span></div><div class="nodeBody"><b>Conflict</b> ${esc(short(n.conflict,105))}<br><b>Action</b> ${esc(short(n.action,82))}<br><b>State</b> ${esc(short(n.conclusion,96))}</div>`;d.onclick=(ev)=>{ev.stopPropagation();openNode(ri,ni)};el.appendChild(d)}))}
function addLine(svg,x1,y1,x2,y2,color='#333'){const p=document.createElementNS('http://www.w3.org/2000/svg','path');const mid=(x1+x2)/2;p.setAttribute('d',`M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);p.setAttribute('fill','none');p.setAttribute('stroke',color);p.setAttribute('stroke-width','1.5');p.setAttribute('marker-end','url(#arrowhead)');svg.appendChild(p)}
function renderArrows(){const svg=document.getElementById('arrows');[...svg.querySelectorAll('path')].forEach(p=>p.remove());data.rows.forEach((r,ri)=>{for(let i=0;i<r.nodes.length-1;i++){let a=r.nodes[i]._pos,b=r.nodes[i+1]._pos;addLine(svg,a.x+a.w,a.y+a.h/2,b.x,b.y+b.h/2)}});for(let ri=0;ri<data.rows.length-1;ri++){let a=data.rows[ri].nodes.at(-1)?._pos,b=data.rows[ri+1].nodes[0]?._pos;if(a&&b)addLine(svg,a.x+a.w,a.y+a.h/2,b.x,b.y+b.h/2,'#666')}}
function applyTransform(){document.getElementById('stage').style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function fitView(){scale=Math.min(window.innerWidth/1780, window.innerHeight/2060);tx=55;ty=55;applyTransform();document.getElementById('status').textContent='Fitted full chart. Zoom in to read cards.'}
function zoomBy(f){const old=scale;scale=Math.max(.12,Math.min(2.5,scale*f));tx=window.innerWidth/2-(window.innerWidth/2-tx)*(scale/old);ty=window.innerHeight/2-(window.innerHeight/2-ty)*(scale/old);applyTransform()}
const map=document.getElementById('map');map.onmousedown=e=>{if(e.button!==0)return;dragging=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;map.classList.add('dragging')};window.onmousemove=e=>{if(!dragging)return;tx=stx+e.clientX-sx;ty=sty+e.clientY-sy;applyTransform()};window.onmouseup=()=>{dragging=false;map.classList.remove('dragging')};map.onwheel=e=>{e.preventDefault();zoomBy(e.deltaY<0?1.12:.89)};
function openNode(ri,ni){current={ri,ni,node:data.rows[ri].nodes[ni]};const n=current.node;document.getElementById('panel').classList.add('open');document.getElementById('panelTitle').textContent=`Edit ${n.id}`;editId.value=n.id;editConflict.value=n.conflict;editAction.value=n.action;editConclusion.value=n.conclusion;editSources.value=n.sources;editNotes.value=n.notes||'';renderNodes()}
function closePanel(){document.getElementById('panel').classList.remove('open');current=null;renderNodes()}
function savePanel(){if(!current)return;const n=current.node;n.id=editId.value;n.conflict=editConflict.value;n.action=editAction.value;n.conclusion=editConclusion.value;n.sources=editSources.value;n.notes=editNotes.value;saveLocal(false);render();document.getElementById('status').textContent=`Saved ${n.id} locally.`}
function deleteCurrentNode(){if(!current||!confirm('Delete this card?'))return;data.rows[current.ri].nodes.splice(current.ni,1);closePanel();saveLocal(false);render()}
function addNodeAfter(){if(!current)return;const r=data.rows[current.ri];const id=r.id+(r.nodes.length+1);r.nodes.splice(current.ni+1,0,{id,conflict:'New conflict',action:'Choose player action',conclusion:'Define state change',sources:'',notes:''});saveLocal(false);render();openNode(current.ri,current.ni+1)}
function toMarkdown(){let md='# Swagbound narrative flowchart draft\n\nSource seed: '+(data.source||'')+'\n\n';for(const r of data.rows){md+='## '+r.id+'. '+r.area+'\n\n- Story job: '+(r.storyJob||'')+'\n- Core pressure: '+(r.corePressure||'')+'\n- Main object/system: '+(r.mainObject||'')+'\n\n| ID | Conflict | Solution / player action | Conclusion / state change | Sources | Notes |\n|---|---|---|---|---|---|\n';for(const n of r.nodes){const cell=v=>String(v||'').replace(/\n/g,'<br>').replace(/\|/g,'\\|');md+='| '+cell(n.id)+' | '+cell(n.conflict)+' | '+cell(n.action)+' | '+cell(n.conclusion)+' | '+cell(n.sources)+' | '+cell(n.notes)+' |\n'}md+='\n'}return md}
function saveLocal(show=true){localStorage.setItem('swagboundEarthboundStyleFlow',JSON.stringify(data));if(show)document.getElementById('status').textContent='Saved locally in this browser.'}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function downloadJSON(){download('swagbound-narrative-flowchart-draft.json',JSON.stringify(data,null,2),'application/json')}
function downloadMarkdown(){download('swagbound-narrative-flowchart-draft.md',toMarkdown(),'text/markdown')}
async function copyMarkdown(){await navigator.clipboard.writeText(toMarkdown());document.getElementById('status').textContent='Copied Markdown.'}
function importJSON(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);saveLocal(false);render();document.getElementById('status').textContent='Imported JSON.'};r.readAsText(f)}
function resetSeed(){if(confirm('Reset to seeded flowchart?')){data=JSON.parse(JSON.stringify(SEED));localStorage.removeItem('swagboundEarthboundStyleFlow');closePanel();render();fitView()}}
render();fitView();
</script></body></html>
