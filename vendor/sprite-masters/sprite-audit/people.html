      }).filter((decision) => decision.status !== "undecided" || decision.notes);
      return {
        schema: "swagbound.spriteAuditDecisions.v1",
        page: PAGE_DATA.fileName,
        title: PAGE_DATA.title,
        exportedAt: new Date().toISOString(),
        reviewOnly: true,
        runtimePromotionAllowed: false,
        decisions
      };
    }
    function buildDeletionProposal() {
      const candidates = [];
      for (const item of items()) {
        const decision = readItemState(itemId(item));
        if (!["delete", "duplicate", "best"].includes(decision.status)) continue;
        const assets = itemAssets(item);
        const bestAsset = assets.find((asset) => asset.id === decision.bestAssetId) || null;
        let proposedAssets = [];
        let reason = decision.status;
        if (decision.status === "best" && bestAsset) {
          proposedAssets = assets.filter((asset) => asset.id !== bestAsset.id);
          reason = decision.siblingDisposition || "duplicate";
        } else if (decision.status === "duplicate" || decision.status === "delete") {
          proposedAssets = assets;
        }
        if (!proposedAssets.length) continue;
        candidates.push({
          id: itemId(item),
          label: item.label || item.id,
          sourcePage: PAGE_DATA.fileName,
          reviewStatus: decision.status,
          proposedAction: reason,
          notes: decision.notes || "",
          bestAssetId: bestAsset?.id || null,
          bestAssetPath: bestAsset?.repoPath || null,
          blockedByRuntimeReference: proposedAssets.some((asset) => asset.runtimeReferenced),
          humanApprovalRequired: true,
          assetPaths: proposedAssets.map((asset) => asset.repoPath),
          runtimeReferencedAssetPaths: proposedAssets.filter((asset) => asset.runtimeReferenced).map((asset) => asset.repoPath),
        });
      }
      return {
        schema: "swagbound.spriteAuditDeletionProposal.v1",
        sourceDecisionSchema: "swagbound.spriteAuditDecisions.v1",
        page: PAGE_DATA.fileName,
        title: PAGE_DATA.title,
        exportedAt: new Date().toISOString(),
        reviewOnly: true,
        destructiveActionAllowed: false,
        runtimePromotionAllowed: false,
        policy: {
          deletionRequiresSeparateHumanApproval: true,
          runtimeReferencesBlockAutomaticDeletion: true,
          duplicateDoesNotMeanDeleteWithoutApproval: true,
        },
        candidates,
      };
    }
    function showJson() {
      els.jsonPreview.value = JSON.stringify(buildExport(), null, 2);
      els.jsonDialog.showModal();
      els.jsonPreview.focus();
      els.jsonPreview.select();
    }
    async function copyExportJson() {
      const text = JSON.stringify(buildExport(), null, 2);
      els.jsonPreview.value = text;
      try { await navigator.clipboard.writeText(text); }
      catch {
        if (!els.jsonDialog.open) els.jsonDialog.showModal();
        els.jsonPreview.focus();
        els.jsonPreview.select();
        document.execCommand("copy");
      }
    }
    async function copyDeletionProposal() {
      const text = JSON.stringify(buildDeletionProposal(), null, 2);
      els.jsonPreview.value = text;
      try { await navigator.clipboard.writeText(text); }
      catch {
        if (!els.jsonDialog.open) els.jsonDialog.showModal();
        els.jsonPreview.focus();
        els.jsonPreview.select();
        document.execCommand("copy");
      }
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    function escapeAttr(value) { return escapeHtml(value); }
  </script>
