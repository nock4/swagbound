    const statuses = [
      ["undecided", "Undecided"],
      ["keep", "Keep"],
      ["best", "Best candidate"],
      ["duplicate", "Duplicate"],
      ["delete", "Delete"],
      ["needs-canon", "Needs canon"],
      ["needs-source", "Needs source"]
    ];
    let state = loadState();
    const els = {
      search: document.getElementById("search"),
      statusFilter: document.getElementById("statusFilter"),
      roleFilter: document.getElementById("roleFilter"),
      count: document.getElementById("count"),
      bulkStatus: document.getElementById("bulkStatus"),
      applyBulk: document.getElementById("applyBulk"),
      clearVisible: document.getElementById("clearVisible"),
      grid: document.getElementById("grid"),
      copyJson: document.getElementById("copyJson"),
      copyDeletionProposal: document.getElementById("copyDeletionProposal"),
      showJson: document.getElementById("showJson"),
      jsonDialog: document.getElementById("jsonDialog"),
      jsonPreview: document.getElementById("jsonPreview"),
      closeJson: document.getElementById("closeJson"),
      copyJsonFromDialog: document.getElementById("copyJsonFromDialog"),
    };
    render();
    bind();

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") || {}; }
      catch { return {}; }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function itemId(item) { return item.id; }
    function itemAssets(item) { return item.assets || []; }
    function itemState(id) {
      if (!state[id]) state[id] = { status: "undecided", notes: "" };
      return state[id];
    }
    function readItemState(id) {
      return state[id] || { status: "undecided", notes: "" };
    }
    function bind() {
      els.search.addEventListener("input", render);
      els.statusFilter.addEventListener("change", render);
      els.roleFilter.addEventListener("change", render);
      els.grid.addEventListener("input", (event) => {
        const id = event.target.dataset.id;
        if (!id) return;
        const item = itemState(id);
        if (event.target.dataset.action === "status") item.status = event.target.value;
        if (event.target.dataset.action === "notes") item.notes = event.target.value;
        if (event.target.dataset.action === "bestAssetId") item.bestAssetId = event.target.value;
        saveState();
        renderCount();
      });
      els.grid.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const id = button.dataset.id;
        if (!id) return;
        const item = currentItems().find((candidate) => itemId(candidate) === id);
        if (!item) return;
        const itemReview = itemState(id);
        if (button.dataset.action === "bestDuplicateRest" || button.dataset.action === "bestDeleteRest") {
          itemReview.status = "best";
          itemReview.bestAssetId ||= itemAssets(item)[0]?.id || "";
          itemReview.siblingDisposition = button.dataset.action === "bestDeleteRest" ? "delete" : "duplicate";
          saveState();
          render();
        }
      });
      els.applyBulk.addEventListener("click", () => markVisible(els.bulkStatus.value));
      els.clearVisible.addEventListener("click", () => markVisible("undecided", true));
      els.copyJson.addEventListener("click", copyExportJson);
      els.copyDeletionProposal.addEventListener("click", copyDeletionProposal);
      els.copyJsonFromDialog.addEventListener("click", copyExportJson);
      els.showJson.addEventListener("click", showJson);
      els.closeJson.addEventListener("click", () => els.jsonDialog.close());
    }
    function items() {
      return PAGE_DATA.kind === "duplicates" ? PAGE_DATA.duplicateGroups : PAGE_DATA.sets;
    }
    function currentItems() {
      const needle = els.search.value.trim().toLowerCase();
      const statusFilter = els.statusFilter.value;
      const roleFilter = els.roleFilter.value;
      return items().filter((item) => {
        const assets = itemAssets(item);
        const status = readItemState(itemId(item)).status;
        const statusOk = statusFilter === "all" || status === statusFilter;
        const roleOk = roleFilter === "all" || assets.some((asset) => asset.role === roleFilter);
        const hay = [item.id, item.label, item.kind, item.categories?.join(" "), item.sourceAreas?.join(" "), assets.map((asset) => [asset.repoPath, asset.category, asset.role, asset.characterSetId].join(" ")).join(" ")].join(" ").toLowerCase();
        return statusOk && roleOk && (!needle || hay.includes(needle));
      });
    }
    function render() {
      const filtered = currentItems();
      els.grid.innerHTML = filtered.map(renderCard).join("");
      renderCount(filtered.length);
    }
    function markVisible(status, clearNotes = false) {
      for (const item of currentItems()) {
        const itemReview = itemState(itemId(item));
        itemReview.status = status;
        if (status === "undecided") {
          delete itemReview.bestAssetId;
          delete itemReview.siblingDisposition;
        }
        if (clearNotes) itemReview.notes = "";
      }
      saveState();
      render();
    }
    function renderCount(renderedCount = null) {
      const decided = Object.values(state).filter((item) => item.status && item.status !== "undecided").length;
      els.count.textContent = (renderedCount ?? document.querySelectorAll(".card").length) + " shown / " + items().length + " total / " + decided + " decided";
    }
    function renderCard(item) {
      const id = itemId(item);
      const itemStateValue = readItemState(id);
      const assets = itemAssets(item);
      const tags = [
        item.kind,
        ...(item.categories || []),
        ...(item.sourceAreas || []),
        ...Object.entries(item.roleCounts || {}).map(([role, count]) => role + " x" + count),
        item.runtimeReferenced ? "runtime-referenced" : "not-runtime-referenced",
      ].filter(Boolean).slice(0, 8);
      return '<article class="card status-' + escapeAttr(itemStateValue.status) + '">' +
        '<div class="thumbs">' + assets.slice(0, 12).map(renderThumb).join("") + '</div>' +
        '<div class="meta">' +
          '<h2>' + escapeHtml(item.label || item.id) + '</h2>' +
          '<div class="subtle">ID: ' + escapeHtml(id) + ' / assets: ' + assets.length + '</div>' +
          '<div class="tags">' + tags.map((tag) => '<span>' + escapeHtml(tag) + '</span>').join("") + '</div>' +
          '<div class="asset-list">' + assets.map(renderAssetRow).join("") + '</div>' +
          '<label>Status <select data-action="status" data-id="' + escapeAttr(id) + '">' + statuses.map(([value, label]) => '<option value="' + escapeAttr(value) + '"' + (itemStateValue.status === value ? " selected" : "") + '>' + escapeHtml(label) + '</option>').join("") + '</select></label>' +
          renderBestControls(id, assets, itemStateValue) +
          '<label>Notes <textarea data-action="notes" data-id="' + escapeAttr(id) + '" placeholder="Canon, duplicate, best candidate, delete reason">' + escapeHtml(itemStateValue.notes || "") + '</textarea></label>' +
        '</div>' +
      '</article>';
    }
    function renderBestControls(id, assets, itemStateValue) {
      if (assets.length < 2) return "";
      const selectedBest = itemStateValue.bestAssetId || assets[0]?.id || "";
      return '<div class="best-controls">' +
        '<label>Best asset <select data-action="bestAssetId" data-id="' + escapeAttr(id) + '">' + assets.map((asset, index) => '<option value="' + escapeAttr(asset.id) + '"' + (selectedBest === asset.id ? " selected" : "") + '>' + escapeHtml((index + 1) + ". " + asset.role + " / " + asset.repoPath) + '</option>').join("") + '</select></label>' +
        '<div class="button-row">' +
          '<button type="button" data-action="bestDuplicateRest" data-id="' + escapeAttr(id) + '">Best + Duplicate Rest</button>' +
          '<button type="button" data-action="bestDeleteRest" data-id="' + escapeAttr(id) + '">Best + Delete Rest</button>' +
        '</div>' +
      '</div>';
    }
    function renderThumb(asset) {
      return '<figure><img loading="lazy" src="' + escapeAttr(asset.imageSrc) + '" alt=""><figcaption>' + escapeHtml(asset.role) + '</figcaption></figure>';
    }
    function renderAssetRow(asset) {
      return '<div class="asset-row"><strong>' + escapeHtml(asset.role) + '</strong><span>' + escapeHtml(asset.width + "x" + asset.height) + '</span><span>' + escapeHtml(asset.repoPath) + '</span></div>';
    }
    function buildExport() {
      const decisions = items().map((item) => {
        const decision = readItemState(itemId(item));
        return {
          id: itemId(item),
          label: item.label || item.id,
          kind: PAGE_DATA.kind,
          status: decision.status,
          notes: decision.notes || "",
          bestAssetId: decision.bestAssetId || null,
          bestAssetPath: itemAssets(item).find((asset) => asset.id === decision.bestAssetId)?.repoPath || null,
          siblingDisposition: decision.siblingDisposition || null,
          siblingAssetPaths: decision.bestAssetId ? itemAssets(item).filter((asset) => asset.id !== decision.bestAssetId).map((asset) => asset.repoPath) : [],
          assetCount: itemAssets(item).length,
          assetPaths: itemAssets(item).map((asset) => asset.repoPath),
          runtimeReferenced: Boolean(item.runtimeReferenced) || itemAssets(item).some((asset) => asset.runtimeReferenced),
        };
      }).filter((decision) => decision.status !== "undecided" || decision.notes);
      return {
        schema: "swagbound.spriteAuditDecisions.v1",
        page: PAGE_DATA.fileName,
        title: PAGE_DATA.title,
        exportedAt: new Date().toISOString(),
        reviewOnly: true,
        runtimePromotionAllowed: false,
        decisions
      };
    }
    function buildDeletionProposal() {
      const candidates = [];
      for (const item of items()) {
        const decision = readItemState(itemId(item));
        if (!["delete", "duplicate", "best"].includes(decision.status)) continue;
        const assets = itemAssets(item);
        const bestAsset = assets.find((asset) => asset.id === decision.bestAssetId) || null;
        let proposedAssets = [];
        let reason = decision.status;
        if (decision.status === "best" && bestAsset) {
          proposedAssets = assets.filter((asset) => asset.id !== bestAsset.id);
          reason = decision.siblingDisposition || "duplicate";
        } else if (decision.status === "duplicate" || decision.status === "delete") {
          proposedAssets = assets;
        }
        if (!proposedAssets.length) continue;
        candidates.push({
          id: itemId(item),
          label: item.label || item.id,
          sourcePage: PAGE_DATA.fileName,
          reviewStatus: decision.status,
          proposedAction: reason,
          notes: decision.notes || "",
          bestAssetId: bestAsset?.id || null,
          bestAssetPath: bestAsset?.repoPath || null,
          blockedByRuntimeReference: proposedAssets.some((asset) => asset.runtimeReferenced),
          humanApprovalRequired: true,
          assetPaths: proposedAssets.map((asset) => asset.repoPath),
          runtimeReferencedAssetPaths: proposedAssets.filter((asset) => asset.runtimeReferenced).map((asset) => asset.repoPath),
        });
      }
      return {
        schema: "swagbound.spriteAuditDeletionProposal.v1",
        sourceDecisionSchema: "swagbound.spriteAuditDecisions.v1",
        page: PAGE_DATA.fileName,
        title: PAGE_DATA.title,
        exportedAt: new Date().toISOString(),
        reviewOnly: true,
        destructiveActionAllowed: false,
        runtimePromotionAllowed: false,
        policy: {
          deletionRequiresSeparateHumanApproval: true,
          runtimeReferencesBlockAutomaticDeletion: true,
          duplicateDoesNotMeanDeleteWithoutApproval: true,
        },
        candidates,
      };
    }
    function showJson() {
      els.jsonPreview.value = JSON.stringify(buildExport(), null, 2);
      els.jsonDialog.showModal();
      els.jsonPreview.focus();
      els.jsonPreview.select();
    }
    async function copyExportJson() {
      const text = JSON.stringify(buildExport(), null, 2);
      els.jsonPreview.value = text;
      try { await navigator.clipboard.writeText(text); }
      catch {
        if (!els.jsonDialog.open) els.jsonDialog.showModal();
        els.jsonPreview.focus();
        els.jsonPreview.select();
        document.execCommand("copy");
      }
    }
    async function copyDeletionProposal() {
      const text = JSON.stringify(buildDeletionProposal(), null, 2);
      els.jsonPreview.value = text;
      try { await navigator.clipboard.writeText(text); }
      catch {
        if (!els.jsonDialog.open) els.jsonDialog.showModal();
        els.jsonPreview.focus();
        els.jsonPreview.select();
        document.execCommand("copy");
      }
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    function escapeAttr(value) { return escapeHtml(value); }
  </script>
</body>
</html>
